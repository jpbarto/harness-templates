pipeline:
  name: pismo-jpbarto-promotion-pipeline
  identifier: pismojpbartopromotionpipeline
  projectIdentifier: pismojpbartopromotion
  orgIdentifier: pismo
  tags: {}
  stages:
    - stage:
        name: Preparation
        identifier: Preparation
        description: ""
        type: Custom
        spec:
          execution:
            steps:
              - step:
                  type: ShellScript
                  name: Examine Trigger
                  identifier: ExamineTrigger
                  spec:
                    shell: Bash
                    executionTarget: {}
                    source:
                      type: Inline
                      spec:
                        script: |-
                          echo examine the trigger event
                          echo triggered by release at <+pipeline.variables.release_repository>
                          echo release tag is <+pipeline.variables.release_tag>
                    environmentVariables: []
                    outputVariables: []
                  timeout: 10m
              - step:
                  type: ShellScript
                  name: Clone Environment Repo
                  identifier: CloneEnvRepo
                  spec:
                    shell: Bash
                    executionTarget: {}
                    source:
                      type: Inline
                      spec:
                        script: |-
                          echo doing prep stuff
                          ENV_DIR=$(mktemp -d)
                          cd $ENV_DIR
                          git clone https://github.com/jpbarto/harness-env
                    environmentVariables: []
                    outputVariables: []
                  timeout: 10m
              - step:
                  type: ShellScript
                  name: Explore Worker
                  identifier: Explore_Worker
                  spec:
                    shell: Bash
                    executionTarget: {}
                    source:
                      type: Inline
                      spec:
                        script: |-
                          echo === pwd ===
                          pwd
                          echo === tree ===
                          tree
                          echo === ls / ===
                          ls -alh /
                    environmentVariables: []
                    outputVariables: []
                  timeout: 10m
        tags: {}
  variables:
    - name: release_repository
      type: String
      description: ""
      required: true
      value: <+eventPayload.repository.html_url>
    - name: release_tag
      type: String
      description: ""
      required: false
      value: <+eventPayload.release.tag_name>
